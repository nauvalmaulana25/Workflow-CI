name: MLflow CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting MLflow CI Pipeline"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          which python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow joblib

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI || 'http://127.0.0.1:5001' }}" >> $GITHUB_ENV

      - name: Run mlflow project
        run: |
          mlflow run MLProject/ --no-conda

      - name: Install Python dependencies
        run: |
          echo "Dependencies already installed in previous step"

      - name: Upload to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: trained-model
          path: mlruns/

      - name: Post Set up Python 3.12.7
        run: echo "Python 3.12.7 setup completed"

      - name: Post Run actions/checkout@v3
        run: echo "Checkout completed"

      - name: Complete job
        run: echo "MLflow CI Pipeline completed successfully"
